services:
  server:
    build: ./server
    image: checkin-server:${IMAGE_TAG:-latest}
    environment:
      TZ: Asia/Shanghai
      DB_HOST: ${DB_HOST:-110.42.214.127}
      DB_PORT: ${DB_PORT:-13306}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-hik12345}
      DB_NAME: ${DB_NAME:-checkin}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      SUPER_ADMIN_IDS: ${SUPER_ADMIN_IDS:-test123}
      TEST_MODE: ${TEST_MODE:-false}
    ports:
      - "${SERVER_PORT:-3001}:3001"
    restart: unless-stopped

  h5:
    build: ./h5
    image: checkin-h5:${IMAGE_TAG:-latest}
    ports:
      - "${H5_PORT:-8091}:80"
    depends_on:
      - server
    restart: unless-stopped

  admin:
    build: ./admin
    image: checkin-admin:${IMAGE_TAG:-latest}
    ports:
      - "${ADMIN_PORT:-8090}:80"
    depends_on:
      - server
    restart: unless-stopped
