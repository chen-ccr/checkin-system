<body>
    <div id="app"></div>
    <script src="https://webapi.amap.com/maps?v=2.0&key=a9ba8d25e074429c7711ccad6cb05950">
        const map = new AMap.Map('map', {
            zoom: 15,
            center: [121.4737, 31.2304]
        })

        let marker

        map.on('click', function (e) {
            const { lng, lat } = e.lnglat

            if (marker) map.remove(marker)

            marker = new AMap.Marker({
                position: [lng, lat]
            })

            map.add(marker)

            selected = { lat, lng }
        })
    </script>
</body>
